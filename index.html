<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
})(window,document,'script','dataLayer','GTM-M2WGLG4L');</script>

  <title>Pool Shot Margin Visualizer</title>
  <link rel="stylesheet" href="pool.css" />
</head>
<body>
  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-M2WGLG4L"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <!-- End Google Tag Manager (noscript) -->
  <div id="table-container">
    <svg id="table-svg" role="img" aria-label="Pool table diagram"></svg>
  </div>

  <div id="controls">
    <div id="controls-grid">
      <!-- Left column: Target pocket, Shot speed, Execution error -->
      <div class="control-col">
        <div class="control-group">
          <label>Target pocket</label>
          <div class="toggle-group" id="pocket-toggle">
            <button data-pocket="corner" class="active">Corner</button>
            <button data-pocket="side">Side</button>
          </div>
        </div>

        <div class="control-group">
          <label>Shot speed <span class="info-btn" data-info="The cue ball's speed at impact. Slower shots produce more throw (collision-induced deflection). Values are 1, 3, and 7 mph.">&#9432;</span></label>
          <div class="toggle-group" id="speed-toggle">
            <button data-speed="slow">Slow (1)</button>
            <button data-speed="medium" class="active">Medium (3)</button>
            <button data-speed="fast">Fast (7)</button>
          </div>
        </div>

        <div class="control-group">
          <label for="error-slider">
            Execution error (Δφ): <span id="display-delta-phi">—</span> <span class="info-btn" data-info="The shooter's aiming precision. This is the 95% confidence interval of the cue ball's direction error, modeled as a Gaussian. At 1°, 95% of shots land within ±1° of the intended aim.">&#9432;</span>
          </label>
          <input
            type="range"
            id="error-slider"
            min="0"
            max="2"
            step="0.01"
            value="0.4"
          />
        </div>
      </div>

      <!-- Right column: Adjust aim for throw, Throw compensation accuracy -->
      <div class="control-col">
        <div class="control-group">
          <label class="toggle-label">
            <input type="checkbox" id="cit-adjust-toggle" />
            Adjust aim for throw <span class="info-btn" data-info="When on, the player adjusts their aim to compensate for collision-induced throw. The ghost ball shifts to the compensated position.">&#9432;</span>
          </label>
        </div>

        <div id="cit-accuracy-group" class="control-group disabled">
          <label for="cit-slider">
            Throw compensation error: <span id="display-cit-error">—</span> <span class="info-btn" data-info="The player's error in compensating for throw, as a percentage of the full throw angle. At 10%, the 95% confidence interval of the compensation error is ±10% of the throw angle. Higher values mean less precise compensation.">&#9432;</span>
          </label>
          <input
            type="range"
            id="cit-slider"
            min="0"
            max="100"
            step="1"
            value="30"
          />
        </div>
      </div>
    </div>

    <div id="outputs-grid">
      <div class="info-row">
        <span class="info-label">Cut angle φ <span class="info-btn" data-info="The angle between the cue ball's aim direction and the line through the ball centers. 0° is a straight-in shot; larger angles are thinner cuts.">&#9432;</span></span>
        <span id="display-cut-angle" class="info-value">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">Shot distance d <span class="info-btn" data-info="The distance between the cue ball and object ball centers.">&#9432;</span></span>
        <span id="display-distance" class="info-value">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">Pocket tolerance α <span class="info-btn" data-info="The half-angle of the effective pocket opening as seen from the object ball. Larger values mean a more forgiving shot.">&#9432;</span></span>
        <span id="display-alpha" class="info-value">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">Target size <span class="info-btn" data-info="The effective width of the pocket opening, accounting for ball radius and approach angle. Varies as the object ball moves.">&#9432;</span></span>
        <span id="display-target-size" class="info-value">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">Throw <span class="info-btn" data-info="Collision-induced throw: the angular deflection of the object ball due to friction during the collision. Depends on cut angle and shot speed.">&#9432;</span></span>
        <span id="display-throw" class="info-value">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">Arc length of ±<span id="label-arc-deltaphi">—</span>° at OB <span class="info-btn" data-info="The physical spread of the ±Δφ execution error cone, measured at the object ball distance. Equal to 2 × Δφ × d (converted to mm). Gives a concrete sense of aiming precision.">&#9432;</span></span>
        <span id="display-arc-length" class="info-value">—</span>
      </div>
    </div>

    <div id="degenerate-msg">
      Cut angle &ge; 90&deg; &mdash; shot not makeable from this position.
    </div>
  </div>

  <footer id="credits">
    Math from <a href="https://www.engr.colostate.edu/~dga/bio/publications/#Research" target="_blank" rel="noopener">Dr. Dave Alciatore</a> &mdash;
    <a href="https://github.com/jrauser/pool" target="_blank" rel="noopener">source</a>
  </footer>

  <div id="info-popup" class="info-popup" style="display:none">
    <span id="info-popup-text"></span>
  </div>

  <script type="module" src="pool.js"></script>
</body>
</html>
